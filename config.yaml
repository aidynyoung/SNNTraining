# SNNTraining Configuration
# Dual-Timescale Hebbian SNN Parameters

# Model Architecture
model:
  input_size: 100  # Matches Indy dataset (100 neurons)
  hidden_size: 128  # Larger hidden layer for better representation
  output_size: 2   # 2D velocity (x, y)
  sparse_init: true  # Use sparse recurrent initialization
  sparse_p: 0.15    # 15% connectivity (biologically plausible)

# Training Parameters
training:
  learning_rate: 0.001
  timesteps: 500
  gradient_clip: 0.1

# LIF Neuron Parameters
lif:
  tau: 20.0         # Membrane time constant (ms)
  v_th: 1.0         # Spike threshold
  v_reset: 0.0      # Reset voltage
  refractory: 2     # Refractory period (timesteps)
  dt: 1.0           # Simulation time step (ms)
  adaptive_threshold: false  # Enable adaptive threshold (optional)
  target_rate: 0.1  # Target firing rate for adaptive threshold

# Hebbian Learning Parameters
hebbian:
  tau_fast: 5.0
  tau_slow: 50.0
  alpha: 0.7
  beta: 0.3

# Device Configuration
device: "auto"  # "auto", "cpu", "cuda"

# Data Parameters
data:
  synthetic_freq: 50.0  # Frequency for synthetic data generation
  T: 2000               # Default sequence length
  noise: 0.1            # Noise level for velocity generation

# Readout Configuration
readout:
  mode: "smoothed"    # "direct" or "smoothed" (EMA filtering)
  smooth_tau: 5.0     # Exponential smoothing time constant

# Logging
logging:
  print_interval: 100
  save_plots: true

# Optimization Settings
optimization:
  use_cached_forward: true  # Share forward pass in hybrid mode
  use_jit: true  # Enable JIT compilation for eligibility traces
  skip_threshold: 0.001  # Skip FORCE updates when error below this
  lr_warmup_steps: 100  # Learning rate warmup steps
  grad_clip_norm: 1.0  # Gradient clipping norm
  update_frequency: 1  # Run expensive methods every N steps (hybrid mode)

# Adaptive Learning Rate Scheduler
adaptive_lr:
  enabled: true
  min_lr: 1e-6
  max_lr: 1e-2
  decay_factor: 0.95
  decay_every: 1000
  grad_norm_threshold: 10.0

# Hybrid Mode Optimization
hybrid:
  error_threshold: 0.01  # Skip expensive updates below this error
  warmup_steps: 100  # Learning rate warmup steps

# E-prop Optimization
eprop:
  adaptive_tau: true  # Enable adaptive eligibility time constant
  tau_min: 10.0       # Minimum eligibility tau
  tau_max: 50.0       # Maximum eligibility tau
  target_spike_rate: 0.1  # Target spike rate for adaptation

# FORCE Optimization
force:
  adaptive_forgetting: true  # Enable adaptive forgetting factor
  min_alpha_rls: 0.5         # Minimum alpha (inverse covariance)
  max_alpha_rls: 2.0         # Maximum alpha
  skip_below_error: 0.001    # Skip RLS update when error norm below this
  error_window: 100          # Window for computing error variance

# ── Kleyko 2022 VSA Framework ─────────────────────────────────────────────────
# Data structures, search, Turing completeness, and hardware mapping
# for hyperdimensional computing (Kleyko et al., 2022, ACM Computing Surveys).
kleyko_framework:
  default_dim: 10000
  search_top_k: 3
  turing_max_steps: 100
  hardware_arch: "cmos_digital"  # cmos_digital | rram_crossbar | neuromorphic | photonic

# ── Binary HDC Tradeoffs (Rahimi 2018) ────────────────────────────────────────
# Classification and recall with binary hyperdimensional computing:
# the tradeoffs between density, accuracy, and energy.
binary_hdc_tradeoffs:
  default_dim: 10000
  default_density: 0.5
  density_range: [0.01, 0.99]
  n_density_steps: 20

# ── Kleyko 2023 Survey Part I & II ────────────────────────────────────────────
# Missing models from the comprehensive HDC survey:
# N-gram encoding, record encoding, spatial encoding, retraining, ensembles.
kleyko_survey:
  default_dim: 10000
  default_ngram_n: 3
  retraining_max_iterations: 10
  retraining_learning_rate: 0.1
  ensemble_n_classifiers: 10
  calibration_method: "temperature"  # temperature | platt | vector | isotonic

# ── Image Descriptor Aggregation (Neubert & Schubert 2021) ────────────────────
# Hyperdimensional computing as a framework for systematic aggregation
# of image descriptors.
image_descriptor_aggregation:
  default_dim: 10000
  n_descriptors: 128
  fusion_method: "bundle"  # bundle | weighted | hierarchical | attention

# ── FSM Synthesis (Osipov 2022) ───────────────────────────────────────────────
# Associative synthesis of finite state automata using hyperdimensional computing.
fsm_synthesis:
  default_dim: 10000
  default_confidence_threshold: 0.55

# ── Multivariate Time Series (Kang 2021) ──────────────────────────────────────
# Multivariate time series analysis for driving style classification.
multivariate_timeseries:
  default_dim: 10000
  n_channels: 6
  window_size: 10
  driving_styles: ["aggressive", "normal", "cautious"]

# ── HDC vs NN Comparison (Kleyko 2022) ────────────────────────────────────────
# Benchmarking and architecture advisor for HDC vs neural networks.
hdc_vs_nn:
  default_dim: 10000
  default_n_features: 100
  default_n_classes: 10
  default_n_samples: 1000

# ── Hyperseed (Osipov 2024) ──────────────────────────────────────────────────
# Unsupervised learning with vector symbolic architectures.
hyperseed:
  default_dim: 10000
  merge_threshold: 0.6
  split_threshold: 0.3
  max_iterations: 20
  convergence_delta: 0.001

# ── Residue HDC (Kymn 2025) ──────────────────────────────────────────────────
# Computing with residue numbers in high-dimensional representation.
residue_hdc:
  default_dim: 10000
  default_moduli: [3, 5, 7, 11]

# ── Dual-Encoding Multi-Modal HDC (Imani 2024) ───────────────────────────────
# Multi-modal learning with modality-specific encoders and shared HD space.
dual_encoding:
  default_dim: 10000
  fusion_method: "bundle"  # bundle | bind | attention
  n_patches: 16
  vocab_size: 10000
  ngram_n: 3
  n_freq_bins: 128

# ── QUANTHD Quantized HDC (Imani 2023) ───────────────────────────────────────
# Quantized hyperdimensional computing for efficient learning.
quanthd:
  default_dim: 10000
  default_n_bits: 4
  default_scheme: "uniform"  # binary | ternary | uniform | stochastic | adaptive
  encoding_bits: 32
  prototype_bits: 8
  similarity_bits: 4
  accumulator_bits: 16
